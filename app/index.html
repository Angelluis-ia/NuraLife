<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NuraLife - Evaluación de Bienestar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <h1>NuraLife</h1>
        <p>Evalúa tu estado actual y recibe una lectura clara con pasos para mejorar.</p>
      </header>

      <section class="card">
        <h2>Datos de hoy</h2>
        <form id="wellness-form" class="form-grid">
          <label>Actividad física (0-10)
            <input type="range" name="activity" min="0" max="10" value="8" />
          </label>
          <label>Horas de sueño
            <input type="number" name="sleep" min="0" max="12" step="0.5" value="6" />
          </label>
          <label>Calidad nutricional (0-10)
            <input type="range" name="nutrition" min="0" max="10" value="5" />
          </label>
          <label>Estrés percibido (0-10)
            <input type="range" name="stress" min="0" max="10" value="6" />
          </label>
          <label class="full-width">Rutina diaria (opcional)
            <textarea name="dailyRoutine" rows="3" placeholder="Ej: entreno fuerza por la mañana, trabajo sentado y ceno tarde"></textarea>
          </label>
          <label class="full-width">Rutina semanal (opcional)
            <textarea name="weeklyRoutine" rows="3" placeholder="Ej: 4 días de gym, 1 partido, fines de semana con comidas fuera"></textarea>
          </label>
          <button type="submit">Analizar bienestar</button>
        </form>
      </section>

      <section class="results-grid">
        <article class="card insight">
          <p class="eyebrow">EN POCAS PALABRAS</p>
          <p id="summary-text"></p>
          <blockquote id="coach-quote" class="quote"></blockquote>
        </article>

        <aside class="card score-card">
          <p class="eyebrow">PUNTUACIÓN</p>
          <p id="score-number" class="score-number">0</p>
          <div class="bar-track"><div id="score-bar" class="bar-fill"></div></div>
          <p class="eyebrow">NIVEL DE BIENESTAR</p>
          <p id="wellness-level" class="level"></p>
        </aside>
      </section>

      <section>
        <h2>Pasos para mejorar</h2>
        <div id="tips-grid" class="tips-grid"></div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>

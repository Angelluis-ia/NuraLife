<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NuraLife</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f9fafb 0%, #e8f4ff 100%);
        color: #111827;
      }

      main {
        text-align: center;
        padding: 2rem;
        max-width: 680px;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0.75rem 0;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .badge {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.4rem 0.8rem;
        background: #2563eb;
        color: #ffffff;
        border-radius: 9999px;
        font-size: 0.9rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NuraLife</h1>
      <p>
        El despliegue está activo correctamente. Este repositorio ya incluye una página inicial
        para evitar el error <strong>404</strong> en Vercel.
      </p>
      <p>
        Próximo paso recomendado: sustituir esta página por la aplicación (Next.js, API o frontend)
        cuando el primer módulo de producto esté definido.
      </p>
      <span class="badge">Deploy OK</span>
    </main>
  </body>
</html>

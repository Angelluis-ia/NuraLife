<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NuraLife - Rutina consciente</title>
    <link rel="stylesheet" href="./app/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <h1>NuraLife</h1>
        <p>Un espacio tranquilo para transformar tu rutina en bienestar.</p>
      </header>

      <section class="card">
        <h2>Tu rutina (diaria o semanal)</h2>
        <form id="wellness-form" class="form-grid">
          <label>Frecuencia de la rutina
            <select name="routinePeriod">
              <option value="diaria">Diaria</option>
              <option value="semanal">Semanal</option>
            </select>
          </label>

          <label class="full-width">Describe tu rutina
            <textarea name="routineText" rows="5" placeholder="Ej: Trabajo sentado gran parte del día, ceno tarde y entreno 3 veces por semana..."></textarea>
          </label>

          <button type="submit">Generar recomendaciones</button>
        </form>
      </section>

      <section class="results-grid">
        <article class="card insight">
          <p class="eyebrow">EN POCAS PALABRAS</p>
          <p id="summary-text"></p>
          <blockquote id="coach-quote" class="quote"></blockquote>
        </article>

        <aside class="card score-card">
          <p class="eyebrow">PUNTUACIÓN</p>
          <p id="score-number" class="score-number">0</p>
          <div class="bar-track"><div id="score-bar" class="bar-fill"></div></div>
          <p class="eyebrow">NIVEL DE BIENESTAR</p>
          <p id="wellness-level" class="level"></p>
        </aside>
      </section>

      <section>
        <h2>Pasos para mejorar</h2>
        <div id="tips-grid" class="tips-grid"></div>
      </section>
    </main>

    <script type="module" src="./app/main.js"></script>
  </body>
</html>
